# Kubernetes Pods — Declarative Way

In Kubernetes, resources can be created in two ways — **imperative** (kubectl commands directly) and **declarative** (YAML files). This covers the declarative way where everything is defined in a file and you just apply it.

---

## A Quick Note on YAML

YAML is what Kubernetes uses to define resources. Two things that tripped me up early on:

- YAML has **dictionaries** (key-value pairs) and **lists** (items that start with a `-` hyphen)
- **Indentation and spaces are everything** — wrong indentation breaks the file, and tabs are not allowed, only spaces

---

## Pod Manifest

```yaml
# pod1.yaml
apiVersion: v1
kind: Pod
metadata:
  name: myapp
  labels:
    app.kubernetes.io/name: myapp
spec:
  containers:
  - name: myapp
    image: nginx
    ports:
      - containerPort: 80
```

---

## Applying the Manifest

```bash
kubectl create -f pod1.yaml   # throws an error if the pod already exists
kubectl apply -f pod1.yaml    # safe to run multiple times, creates or updates
```

I mostly use `apply` — it's idempotent, so running it again doesn't break anything.

---

## Commands I Use to Work with Pods

**Check if the pod is running:**
```bash
kubectl get pods
```

**Describe a pod — this is where I go first when something is wrong:**
```bash
kubectl describe pod myapp
```

> If you see `ImagePullBackOff` in the events section, it almost always means the image name is wrong or the image doesn't exist in the registry.

**Edit a pod directly on the cluster:**
```bash
kubectl edit pod myapp
```

**Get a shell inside the pod:**
```bash
kubectl exec -it myapp -- sh
```

---

## Dry Run — See the Output Before Creating Anything

Really useful when I want to generate a base YAML without writing it from scratch. The `--dry-run=client` flag means nothing actually gets created — it just shows what would happen. Adding `-o yaml` prints the output in YAML format.

```bash
kubectl run nginx --image=nginx --dry-run=client -o yaml
```

I use this a lot to quickly scaffold a manifest and then edit it.

---

## Labels

Labels are key-value pairs you attach to resources. They are really useful for **grouping and filtering**.

Imagine having 100 pods — labels let you quickly filter which ones belong to frontend, backend, a specific version, etc.

**See the labels on a pod:**
```bash
kubectl get pods myapp --show-labels
```

---

## Finding Which Node a Pod is Running On

```bash
kubectl get pods myapp -o wide
```

```
NAME    READY   STATUS    RESTARTS   AGE   IP           NODE                   NOMINATED NODE   READINESS GATES
myapp   1/1     Running   0          23m   10.244.1.2   cka-cluster2-worker2   <none>           <none>
```

The `-o wide` flag adds extra columns — pod IP, the node it's scheduled on, and a few others. Handy when working with multi-node clusters.

```bash
kubectl get nodes -o wide   # same flag works for nodes too
```
